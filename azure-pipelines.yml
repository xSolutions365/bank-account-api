trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: 'Release'
  solution: 'BankAccountSolution.sln'

stages:

# ─────────────────────────────────────────────────────────────────────────────
# Stage 1 – Build & Test
# ─────────────────────────────────────────────────────────────────────────────
- stage: BuildAndTest
  displayName: 'Build & Test'
  jobs:
  - job: Build
    displayName: 'Restore · Build · Test'
    steps:

    - task: UseDotNet@2
      displayName: 'Use .NET 8 SDK'
      inputs:
        packageType: sdk
        version: '8.x'

    - task: DotNetCoreCLI@2
      displayName: 'Restore dependencies'
      inputs:
        command: restore
        projects: '$(solution)'

    - task: DotNetCoreCLI@2
      displayName: 'Build solution'
      inputs:
        command: build
        projects: '$(solution)'
        arguments: '--configuration $(buildConfiguration) --no-restore'

    - task: DotNetCoreCLI@2
      displayName: 'Run tests with code coverage'
      inputs:
        command: test
        projects: '**/*.Tests.csproj'
        arguments: >
          --configuration $(buildConfiguration)
          --no-build
          --collect:"XPlat Code Coverage"
          --results-directory $(Agent.TempDirectory)/TestResults
        publishTestResults: true

    - task: PublishCodeCoverageResults@2
      displayName: 'Publish code coverage'
      inputs:
        summaryFileLocation: '$(Agent.TempDirectory)/TestResults/**/coverage.cobertura.xml'
        failIfCoverageEmpty: false

# ─────────────────────────────────────────────────────────────────────────────
# Stage 2 – Code Quality (SonarCloud)
# Prerequisite: create a SonarCloud service connection named "SonarCloud"
# in Project Settings → Service connections, then set the variables below.
# ─────────────────────────────────────────────────────────────────────────────
- stage: CodeQuality
  displayName: 'Code Quality – SonarCloud'
  dependsOn: BuildAndTest
  jobs:
  - job: SonarAnalysis
    displayName: 'SonarCloud analysis'
    variables:
      # Set these in the pipeline UI or as pipeline variables:
      #   sonar.organization  – your SonarCloud organization key
      #   sonar.projectKey    – your SonarCloud project key
      sonarOrganization: '$(sonar.organization)'
      sonarProjectKey: '$(sonar.projectKey)'
    steps:

    - task: UseDotNet@2
      displayName: 'Use .NET 8 SDK'
      inputs:
        packageType: sdk
        version: '8.x'

    - task: SonarCloudPrepare@3
      displayName: 'Prepare SonarCloud analysis'
      inputs:
        SonarCloud: 'SonarCloud'          # name of the service connection
        organization: '$(sonarOrganization)'
        scannerMode: dotnet
        projectKey: '$(sonarProjectKey)'
        projectName: 'bank-account-api'
        extraProperties: |
          sonar.cs.cobertura.reportsPaths=$(Agent.TempDirectory)/TestResults/**/coverage.cobertura.xml
          sonar.coverage.exclusions=**/*.Tests/**

    - task: DotNetCoreCLI@2
      displayName: 'Restore dependencies'
      inputs:
        command: restore
        projects: '$(solution)'

    - task: DotNetCoreCLI@2
      displayName: 'Build solution (for Sonar)'
      inputs:
        command: build
        projects: '$(solution)'
        arguments: '--configuration $(buildConfiguration) --no-restore'

    - task: DotNetCoreCLI@2
      displayName: 'Run tests (for Sonar coverage)'
      inputs:
        command: test
        projects: '**/*.Tests.csproj'
        arguments: >
          --configuration $(buildConfiguration)
          --no-build
          --collect:"XPlat Code Coverage"
          --results-directory $(Agent.TempDirectory)/TestResults
        publishTestResults: false

    - task: SonarCloudAnalyze@3
      displayName: 'Run SonarCloud analysis'

    - task: SonarCloudPublish@3
      displayName: 'Publish SonarCloud quality gate result'
      inputs:
        pollingTimeoutSec: '300'

# ─────────────────────────────────────────────────────────────────────────────
# Stage 3 – Security (OWASP Dependency Check)
# Scans NuGet packages for known CVEs using the NVD database.
# ─────────────────────────────────────────────────────────────────────────────
- stage: SecurityScan
  displayName: 'Security – OWASP Dependency Check'
  dependsOn: BuildAndTest
  jobs:
  - job: DependencyCheck
    displayName: 'OWASP Dependency Check'
    steps:

    - task: UseDotNet@2
      displayName: 'Use .NET 8 SDK'
      inputs:
        packageType: sdk
        version: '8.x'

    - task: DotNetCoreCLI@2
      displayName: 'Restore dependencies'
      inputs:
        command: restore
        projects: '$(solution)'

    - task: dependency-check-build-task@6
      displayName: 'OWASP Dependency Check scan'
      inputs:
        projectName: 'bank-account-api'
        scanPath: '$(Build.SourcesDirectory)'
        format: 'HTML,JUNIT'
        failOnCVSS: '7'           # fail the build on high/critical CVEs (score ≥ 7)
        suppressionPath: ''
        additionalArguments: '--enableRetired'

    - task: PublishTestResults@2
      displayName: 'Publish Dependency Check results'
      condition: always()
      inputs:
        testResultsFormat: JUnit
        testResultsFiles: '**/dependency-check-junit.xml'
        testRunTitle: 'OWASP Dependency Check'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish Dependency Check HTML report'
      condition: always()
      inputs:
        pathToPublish: '$(Build.SourcesDirectory)/dependency-check-report.html'
        artifactName: 'DependencyCheckReport'
